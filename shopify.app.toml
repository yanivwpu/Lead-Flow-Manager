# WhachatCRM — reference config (URLs match production).
# Primary deploy target in this repo: `shopify.app.whachatcrm.toml` (use: shopify app deploy --config shopify.app.whachatcrm.toml).
# client_id is set from SHOPIFY_API_KEY in CI/CLI when applicable.

name = "WhachatCRM"
client_id = "e4585d4a1434c9e5649a2269e716076"
application_url = "https://app.whachatcrm.com"
embedded = false

[access_scopes]
# Kept in sync with server/shopify.ts — see SHOPIFY_SCOPES comment there.
scopes = "read_customers"

[auth]
redirect_urls = ["https://app.whachatcrm.com/api/shopify/callback"]

[webhooks]
api_version = "2026-01"

[webhooks.privacy_compliance]
customer_deletion_url = "https://app.whachatcrm.com/api/shopify/webhooks/customers/redact"
customer_data_request_url = "https://app.whachatcrm.com/api/shopify/webhooks/customers/data_request"
shop_deletion_url = "https://app.whachatcrm.com/api/shopify/webhooks/shop/redact"
