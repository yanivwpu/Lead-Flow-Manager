# WhachatCRM Shopify App Configuration
# Deploy this configuration using: shopify app deploy
# Note: client_id should be set via SHOPIFY_API_KEY environment variable

name = "WhachatCRM"
# client_id is managed by Shopify CLI from environment
application_url = "https://whachatcrm.com"
embedded = false

[access_scopes]
scopes = "read_products,read_orders,read_customers"

[auth]
redirect_urls = ["https://whachatcrm.com/api/shopify/callback"]

[webhooks]
api_version = "2026-01"

[webhooks.privacy_compliance]
customer_deletion_url = "https://whachatcrm.com/api/shopify/webhooks/customers/redact"
customer_data_request_url = "https://whachatcrm.com/api/shopify/webhooks/customers/data_request"
shop_deletion_url = "https://whachatcrm.com/api/shopify/webhooks/shop/redact"
