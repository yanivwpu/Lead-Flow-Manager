    <!-- Persist RTL direction on initial load (before React hydrates) -->
    <script>
      (function() {
        var storedLang = localStorage.getItem('i18nextLng') || 'en';
        var rtlLanguages = ['he', 'ar', 'fa', 'ur'];
        var isRtl = rtlLanguages.includes(storedLang);
        document.documentElement.lang = storedLang;
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
      })();
    </script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => console.log('SW registered: ', registration))
            .catch(error => console.log('SW registration failed: ', error));
        });
      }
    </script>

    <!-- Mobile keyboard / viewport fix:
         iOS Safari and Brave on iPhone do not resize fixed containers when
         the virtual keyboard opens.  We track the visual-viewport height and
         write it to a CSS custom property so the app shell can use it instead
         of 100dvh / 100vh (which are unreliable across iOS browser versions). -->
    <script>
      (function () {
        var raf = 0;
        function setVh() {
          if (raf) return;
          raf = requestAnimationFrame(function () {
            raf = 0;
            var vp = window.visualViewport;
            var h = vp ? vp.height : window.innerHeight;
            document.documentElement.style.setProperty('--app-height', h + 'px');
          });
        }
        setVh();
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setVh, { passive: true });
          window.visualViewport.addEventListener('scroll', setVh, { passive: true });
        }
        window.addEventListener('resize', setVh, { passive: true });
      })();
    </script>
