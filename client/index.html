    <!-- Persist RTL direction on initial load (before React hydrates) -->
    <script>
      (function() {
        var storedLang = localStorage.getItem('i18nextLng') || 'en';
        var rtlLanguages = ['he', 'ar', 'fa', 'ur'];
        var isRtl = rtlLanguages.includes(storedLang);
        document.documentElement.lang = storedLang;
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
      })();
    </script>

  <body>
    <div id="root"></div>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => console.log('SW registered: ', registration))
            .catch(error => console.log('SW registration failed: ', error));
        });
      }
    </script>

    <!-- Lazy Loading Images with Alt -->
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('img').forEach((img, i) => {
          if (!img.hasAttribute('alt')) img.setAttribute('alt', 'WhachatCRM image');
          img.setAttribute('loading', i === 0 ? 'eager' : 'lazy');
        });
      });
    </script>
